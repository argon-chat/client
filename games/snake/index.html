<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Strict self-delivered CSP. Bundle is inlined (script 'unsafe-inline'),
       game makes no network requests (connect-src 'none'); avatars arrive as
       data URLs from the host via postMessage (img-src data: blob:). -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; script-src 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'unsafe-inline'; img-src data: blob:; base-uri 'none'; form-action 'none'">
  <title>Snake - Argon Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }
    canvas {
      display: block;
      border-radius: 6px;
    }
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
    }
  </style>
</head>
<body>
  <div id="loading">Connecting to Argon...</div>
  <canvas id="game"></canvas>
  <!-- PLAYFRAME_BUNDLE: build-games.ts inlines the IIFE bundle here -->
  <!--PLAYFRAME_BUNDLE-->
</body>
</html>
