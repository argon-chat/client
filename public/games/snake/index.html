<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake - Argon Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }
    canvas {
      display: block;
      border-radius: 6px;
    }
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
    }
  </style>
</head>
<body>
  <div id="loading">Connecting to Argon...</div>
  <canvas id="game"></canvas>
  <!-- Bundled (IIFE) from client/games/snake/main.ts via `bun run build:games`.
       Classic script (not module) so it loads in the opaque-origin sandbox. -->
  <script src="./bundle.js"></script>
</body>
</html>
